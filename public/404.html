<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gabriele Pinese | FE Developer</title>
    <script>
      var base = "/portfolio";
      var path = window.location.pathname;
      var query = window.location.search;
      var hash = window.location.hash;

      if (path.startsWith(base)) {
        var newPath = path.slice(base.length) || "/";
        sessionStorage.redirect = newPath + query + hash;
      }

      window.location.replace(base + "/?p=1");
    </script>
  </head>
  <body></body>
</html>
