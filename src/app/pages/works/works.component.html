<div class="works-container works">
  <div class="works-content">
    <div class="title-container">
      <div class="title-content">
        <h1 class="bigTitle bold">
          {{ c.works.title }}<span class="redPrimary">.</span>
        </h1>
        <h2 class="body24" [innerHTML]="c.works.subtitle"></h2>
      </div>
    </div>

    <div class="scroll-indicator" aria-hidden="true">
      <div class="scroll-track">
        <div class="scroll-dot"></div>
      </div>
    </div>
  </div>

  <div class="works-main-section">
    <div class="section-title">
      <span class="section-label">{{ c.works.experiences }}</span>
      <div class="section-line"></div>
    </div>
    @for (company of companyList; track $index) {
      <app-item-list
        [link]="company.link"
        [from]="company.from"
        [to]="company.to"
        [company]="company.companyName"
        [title]="company.title"
        [desc]="company.description"
        [chips]="company.chips"
      ></app-item-list>
    }

    <div class="projects-section" id="projects">
      <div class="section-title">
        <span class="section-label">{{ c.works.projects }}</span>
        <div class="section-line"></div>
      </div>

      @if (projectList.length === 0) {
        <div class="projects-empty">
          <span class="empty-label">{{ c.works.comingSoon.label }}</span>
          <p class="body18 empty-desc">{{ c.works.comingSoon.desc }}</p>
        </div>
      } @else {
        @for (project of projectList; track project.id) {
          <!-- project card -->
        }
      }
    </div>
  </div>
</div>
