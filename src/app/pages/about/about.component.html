<div class="about-container about">
  <!-- Hero -->
  <div class="about-content">
    <div class="title-container">
      <div class="title-content">
        <div class="bigTitle bold">
          {{ c.about.title }}<span class="purplePrimary">.</span>
        </div>
        <div class="body24 opacityT" [innerHTML]="c.about.intro"></div>
      </div>
    </div>

    <div class="scroll-indicator" aria-hidden="true">
      <div class="scroll-track">
        <div class="scroll-dot"></div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="about-main-section">
    <!-- Profile -->
    <div class="about-presentation reveal">
      <app-terminal-card></app-terminal-card>

      <div class="pres-container">
        <div class="heading3 bold">
          {{ c.about.journeyHeading }}<span class="purplePrimary">.</span>
        </div>
        <div class="body20 opacityT" [innerHTML]="c.about.journeyBody"></div>
      </div>
    </div>

    <!-- Stack -->
    <div class="about-stack-section reveal">
      <div class="stack-grid">
        @for (item of STACK; track $index) {
          <div class="stack-icon" [style.--i]="$index">
            <div class="icon-wrap">
              @if (item.imgSrc) {
                <img
                  [src]="item.imgSrc"
                  [alt]="item.label"
                  class="stack-img"
                  loading="lazy"
                />
              } @else {
                <i [class]="item.icon"></i>
              }
            </div>
            <span>{{ item.label }}</span>
          </div>
        }
      </div>
    </div>

    <!-- Skills -->
    <div class="skills-section">
      <div class="focus-panels">
        <!-- Row 1: Angular + Design -->
        <div class="focus-row reveal">
          <div class="focus-row__text">
            <div class="focus-item body18">{{ c.about.angularBody }}</div>
          </div>

          <div class="focus-row__visual">
            <img
              src="assets/images/about-angular-design.svg"
              alt=""
              aria-hidden="true"
              loading="lazy"
            />
          </div>
        </div>

        <!-- Row 2: Modular Architecture -->
        <div class="focus-row focus-row--reverse reveal" style="--delay: 0.1s">
          <div class="focus-row__text">
            <div class="skills-header reveal">
              <div class="heading3 bold">
                {{ c.about.architectureTitle
                }}<span class="purplePrimary">.</span>
              </div>
            </div>
            <div class="focus-item body18">{{ c.about.architectureBody }}</div>
          </div>

          <div class="focus-row__visual">
            <img
              src="assets/images/about-architecture.svg"
              alt=""
              aria-hidden="true"
              loading="lazy"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- Drawing -->
    <div class="about-drawing-section reveal">
      <span class="body18 opacityT" [innerHTML]="c.about.drawing"></span>
    </div>
  </div>

  <!-- Footer CTA -->
  <div class="about-footer-container">
    <div class="cta-divider reveal"></div>

    <div class="heading1 bold reveal" style="--delay: 0.1s">
      {{ c.about.ctaHeading }}<span class="purplePrimary">?</span>
    </div>

    <div
      class="body20 cta-body reveal opacityT"
      style="--delay: 0.25s"
      [innerHTML]="c.about.ctaBody"
    ></div>

    <button
      class="secondary-btn about-btn reveal"
      [ngClass]="{ 'mx-auto': isMedium() }"
      style="--delay: 0.4s"
      type="button"
      (click)="downloadCV()"
    >
      <span class="btn-float-wrap">
        <span class="btn-inner">
          <span class="btn-text">{{ c.about.ctaBtn }}</span>
          <span class="btn-text" aria-hidden="true">{{ c.about.ctaBtn }}</span>
        </span>
      </span>
    </button>
  </div>
</div>
