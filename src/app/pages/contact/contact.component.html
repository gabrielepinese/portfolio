<div class="contact-container contact">
  <div class="contact-content">
    <div class="title-container">
      <div class="title-content">
        <div class="bigTitle bold">
          {{ c.contact.title }}<span class="greenPrimary">.</span>
        </div>
        <div class="body24">
          {{ c.contact.subtitle }}
        </div>
      </div>
    </div>

    <div class="scroll-indicator" aria-hidden="true">
      <div class="scroll-track">
        <div class="scroll-dot"></div>
      </div>
    </div>
  </div>

  <div class="contact-desc-container">
    <div class="contact-desc-left">
      <span class="contact-label bold">{{ c.contact.status }}</span>
      <div class="heading1 bold">
        <span class="text-con-bordo2">
          {{ c.contact.heading }}<span class="greenPrimary">.</span>
        </span>
      </div>
    </div>
    <div class="contact-desc-right">
      <div class="body20">
        <span class="text-con-bordo2" [innerHTML]="c.contact.body"></span>
      </div>
      <button
        class="secondary-btn contact-btn"
        [ngClass]="{ 'mx-auto': isMedium() }"
        type="button"
        (click)="sendMail()"
      >
        <span class="btn-float-wrap">
          <span class="btn-inner">
            <span class="btn-text">{{ c.contact.cta }}</span>
            <span class="btn-text" aria-hidden="true">{{ c.contact.cta }}</span>
          </span>
        </span>
      </button>

      @if (showFallback()) {
        <div class="fallback-pill">
          <span class="fallback-label bold">{{ c.contact.noMailClient }}</span>
          <div class="fallback-actions">
            <button
              type="button"
              class="fallback-action-btn bold"
              (click)="copyEmail()"
            >
              {{ emailCopied() ? c.contact.copied : c.contact.copyEmail }}
            </button>
            <a
              class="fallback-action-btn bold"
              href="https://www.linkedin.com/in/gabriele-pinese/"
              target="_blank"
              rel="noopener noreferrer"
              >{{ c.contact.linkedin }}</a
            >
          </div>
        </div>
      }
    </div>
  </div>
</div>
