<div class="home-container home">
  <div class="home-content">
    <div class="title-container">
      <div class="title-content">
        <h1 class="bigTitle">
          <span class="text-con-bordo"
            >{{ c.home.greeting }}<br />
            {{ c.home.namePrefix }} <span class="bold">{{ c.home.name }}</span
            ><span class="orangePrimary">.</span></span
          >
        </h1>
        <h2 class="body24">
          <span class="text-con-bordo">
            {{ c.home.rolePrefix }} <span class="bold">{{ c.home.role }}</span>
            {{ c.home.roleDesc }}
            <span class="bold">{{ c.home.roleSuffix }}</span></span
          >
        </h2>
        <div class="image-container"></div>
      </div>
    </div>

    <div class="scroll-indicator" aria-hidden="true">
      <div class="scroll-track">
        <div class="scroll-dot"></div>
      </div>
    </div>
  </div>

  <section
    class="home-projects-section"
    [attr.aria-label]="c.home.selectedWork"
  >
    <div class="home-projects-content">
      <div class="section-divider">
        <span class="section-label">{{ c.home.selectedWork }}</span>
        <div class="section-line"></div>
      </div>

      <div class="projects-coming-soon">
        <span class="coming-label">{{ c.home.comingSoon.label }}</span>
        <p class="body20 coming-desc">
          {{ c.home.comingSoon.desc }}<br />
          <span class="coming-sub">{{ c.home.comingSoon.sub }}</span>
        </p>
        <button
          class="coming-cta neutral-btn"
          type="button"
          (click)="goToWorks()"
        >
          {{ c.home.cta }} <span aria-hidden="true">→</span>
        </button>
      </div>
    </div>
  </section>
</div>
