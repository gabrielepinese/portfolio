<div class="home-container home">
  <div class="home-content">
    <div class="title-container">
      <div class="title-content">
        <div class="bigTitle" role="heading" aria-level="1">
          <span class="text-con-bordo"
            >Hello,<br />
            I'm <span class="bold">Gabriele</span
            ><span class="orangePrimary">.</span></span
          >
        </div>
        <div class="body24" role="heading" aria-level="2">
          <span class="text-con-bordo">
            I'm a <span class="bold">Front End Developer</span> passionate about
            creating elegant, responsive, and user-centered
            <span class="bold">web experiences.</span></span
          >
        </div>
        <div class="image-container"></div>
      </div>
    </div>

    <div class="scroll-indicator" aria-hidden="true">
      <div class="scroll-track">
        <div class="scroll-dot"></div>
      </div>
    </div>
  </div>

  <section class="home-projects-section">
    <div class="home-projects-content">
      <div class="section-divider">
        <span class="section-label">Selected Work</span>
        <div class="section-line"></div>
      </div>

      <div class="projects-coming-soon">
        <span class="coming-label">Coming soon</span>
        <p class="body20 coming-desc">
          Projects are in the making.<br />
          <span class="coming-sub"
            >Check back soon — something good is on the way.</span
          >
        </p>
        <a class="coming-cta" [routerLink]="['/works']" fragment="projects">
          See work experience <span aria-hidden="true">→</span>
        </a>
      </div>
    </div>
  </section>
</div>
