<button role="button" type="button" (click)="goto(link())">
  <div class="item-list-container">
    <div class="item-list-content">
      <div class="period bold">
        <span>{{ from() }}</span>
        <div class="period-line"></div>
        <span>{{ to() }}</span>
      </div>
      <div class="job-content">
        <div class="item-title-container">
          <div class="body32 bold">{{ company() }}</div>
          <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
              <!-- !Font Awesome Free 6.7.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2025 Fonticons, Inc.  -->
              <path
                fill="#000000"
                d="M438.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L338.8 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l306.7 0L233.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"
              />
            </svg>
          </div>
        </div>
        <div class="body24 bold">{{ title() }}</div>
        <div class="body16">{{ desc() }}</div>
        <div class="chip-container">
          @for (chip of chips(); track $index) {
          <div class="chip bold body14">{{ chip }}</div>
          }
        </div>
      </div>
    </div>
  </div>
</button>
