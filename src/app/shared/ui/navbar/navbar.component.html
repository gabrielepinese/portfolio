<div class="navbar-container">
  <div class="navbar-content">
    <button
      class="neutral-btn"
      (click)="toggleMenu()"
      type="button"
      role="button"
    >
      Menu
    </button>
  </div>
</div>

<!-- MENU OVERLAY -->
@if (menuOpen) {
<div class="menu-overlay" [class.closing]="menuClosing" (click)="toggleMenu()">
  <div
    class="menu-content"
    (click)="$event.stopPropagation()"
    [class.closing]="menuClosing"
  >
    <button class="close-btn" (click)="toggleMenu()">×</button>
    <nav>
      <a (click)="navigate('home')">Home</a>
      <a (click)="navigate('about')">Chi siamo</a>
      <a (click)="navigate('contact')">Contatti</a>
    </nav>
  </div>
</div>
}
