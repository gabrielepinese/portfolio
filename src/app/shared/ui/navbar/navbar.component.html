<ng-template #topBar let-label="label" let-expanded="expanded">
  <div class="top-left-container">
    <button class="logo-wrap" type="button" (click)="navigate('home')" aria-label="Go to home">
      <span class="cookie-logo" aria-hidden="true"></span>
    </button>
    <div class="menu-btn-container">
      <button
        class="neutral-btn bricolage semibold up"
        (click)="toggleMenu()"
        type="button"
        [attr.aria-expanded]="expanded"
        [attr.aria-label]="
          expanded ? 'Close navigation menu' : 'Open navigation menu'
        "
      >
        <span aria-hidden="true">{{ label }}</span>
      </button>
    </div>
  </div>
</ng-template>

<div class="navbar-container">
  <div class="navbar-content" [ngClass]="routeColor()">
    <ng-container
      *ngTemplateOutlet="
        topBar;
        context: { label: 'MENU', expanded: menuOpen() }
      "
    ></ng-container>
    <button
      class="chat-btn neutral-btn"
      type="button"
      (click)="navigate('contact')"
      aria-label="Contact me"
    >
      <svg
        class="chat-icon"
        viewBox="0 0 1024 1024"
        fill="none"
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
      >
        <circle class="icon-bg" cx="512" cy="512" r="460"/>
        <path class="icon-fg" d="M362.666667 640a32 32 0 0 1 0-64h170.666666a32 32 0 0 1 0 64h-170.666666z m0-192a32 32 0 0 1 0-64h298.666666a32 32 0 0 1 0 64H362.666667z m455.786666 390.784l28.096 60.586667A42.666667 42.666667 0 0 1 807.850667 960H512C264.576 960 64 759.424 64 512S264.576 64 512 64s448 200.576 448 448a446.762667 446.762667 0 0 1-141.546667 326.784zM512 896h262.442667l-14.037334-30.293333a64 64 0 0 1 14.272-73.6A382.698667 382.698667 0 0 0 896 512c0-212.074667-171.925333-384-384-384S128 299.925333 128 512s171.925333 384 384 384z"/>
      </svg>
      <span class="chat-label">CONTACT ME</span>
    </button>
  </div>
</div>

<div
  class="route-transition"
  [class.show]="startTransition()"
  [ngStyle]="{ backgroundColor: transitionColor() }"
></div>

<div class="loader-dots" [class.show]="showDots()">
  <span class="dot"></span>
  <span class="dot"></span>
</div>

@if (menuOpen()) {
  <div class="menu-overlay" (click)="toggleMenu()" role="presentation">
    <div
      class="menu-container"
      role="dialog"
      aria-modal="true"
      aria-label="Navigation menu"
      [ngClass]="routeColor()"
      (click)="$event.stopPropagation()"
    >
      <div class="menu-content">
        <div class="menu-top-content">
          <ng-container
            *ngTemplateOutlet="
              topBar;
              context: { label: 'CLOSE', expanded: menuOpen() }
            "
          ></ng-container>
        </div>
        <div class="social-container">
          <span class="social-divider"></span>
          <div class="social-icons">
            <a
              href="https://www.linkedin.com/in/gabriele-pinese/"
              class="social-link"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="LinkedIn"
            >
              <span class="icon icon-linkedin" aria-hidden="true"></span>
            </a>
            <a
              href="https://www.instagram.com/gabriele_pinese/"
              class="social-link"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Instagram"
            >
              <span class="icon icon-instagram" aria-hidden="true"></span>
            </a>
            <a
              href="https://www.facebook.com/gabriele.pinese.9/"
              class="social-link"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Facebook"
            >
              <span class="icon icon-facebook" aria-hidden="true"></span>
            </a>
          </div>
        </div>
        <div class="link-container">
          <div class="link-content">
            <button
              class="neutral-btn semibold"
              (click)="navigate('home')"
              type="button"
              [attr.aria-current]="currentRoute() === 'home' ? 'page' : null"
            >
              <span [ngClass]="routeColor()" class="heading1">Home</span>
            </button>
            <span class="desc-link">Return to home page</span>
          </div>
          <div class="link-content">
            <button
              class="neutral-btn semibold"
              (click)="navigate('about')"
              type="button"
              [attr.aria-current]="currentRoute() === 'about' ? 'page' : null"
            >
              <span [ngClass]="routeColor()" class="heading1">About me</span>
            </button>
            <span class="desc-link">Something about me...</span>
          </div>
          <div class="link-content">
            <button
              class="neutral-btn semibold"
              (click)="navigate('works')"
              type="button"
              [attr.aria-current]="currentRoute() === 'works' ? 'page' : null"
            >
              <span [ngClass]="routeColor()" class="heading1">Work</span>
            </button>
            <span class="desc-link">Find out what I can do</span>
          </div>
          <div class="link-content">
            <button
              class="neutral-btn semibold"
              (click)="navigate('contact')"
              type="button"
              [attr.aria-current]="currentRoute() === 'contact' ? 'page' : null"
            >
              <span [ngClass]="routeColor()" class="heading1">Contact</span>
            </button>
            <span class="desc-link">Let's contact me</span>
          </div>
        </div>
      </div>
    </div>
  </div>
}
